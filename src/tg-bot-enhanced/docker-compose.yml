services:
  api:
    build:
      context: ./api
    env_file:
      - ./api/.env
    depends_on:
      - postgres
    networks:
      - internal
  dashboard:
    build:
      context: ./dashboard
    env_file:
      - ./dashboard/.env
    depends_on:
      - api
    networks:
      - internal
  diarybot-nginx:
    image: nginx:latest
    volumes:
      - ./nginx/conf/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
      - dashboard
    networks:
      - master-nginx-network
      - internal
  bot:
    build:
      context: ./bot
    env_file:
      - ./bot/.env
    depends_on:
      - postgres
    networks:
      - internal
  postgres:
    image: postgres:17
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    env_file:
      - ./postgres/.env
    networks:
      - internal
volumes:
  postgres_data:

networks:
  internal:
  master-nginx-network:
    external: true
